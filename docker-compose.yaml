services:
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: pgwarden_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgwarden_data:/var/lib/postgresql/data
    networks:
      - pgwarden_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: pgwarden_collector
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./config.yaml:/etc/pgwarden/config.yaml:ro
      - ./log:/log:rw
    networks:
      - pgwarden_network

networks:
  pgwarden_network:
    driver: bridge

volumes:
  pgwarden_data: