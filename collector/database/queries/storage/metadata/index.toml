[SELECT]
with_columns_json = """
SELECT
    i.id, i.oid, i.name, i.type, i.definition,
    i.is_unique, i.is_primary,
    COALESCE(json_agg(
        json_build_object('column_attnum', c.ordinal_position, 'ordinal', ic.ordinal_position)
        ORDER BY ic.ordinal_position
    ) FILTER (WHERE c.id IS NOT NULL), '[]'::json) AS columns_info
FROM metadata.index i
LEFT JOIN metadata.index_column ic ON ic.index_id = i.id
LEFT JOIN metadata.column c ON c.id = ic.column_id
WHERE i.database_id = %(database_id)s AND i.deleted_at IS NULL
GROUP BY i.id, i.oid, i.name, i.type, i.definition, i.is_unique, i.is_primary
"""

by_oid = """
SELECT id, oid FROM metadata.index WHERE oid = ANY(%(oids)s)
"""

by_database_id_and_active = """
SELECT oid, id
FROM metadata.index
WHERE database_id = %(database_id)s AND deleted_at IS NULL
"""

[INSERT]
default = """
INSERT INTO metadata.index (
    database_id, table_id, oid, name, type, definition, is_unique, is_primary
) VALUES (
    %(database_id)s, %(table_id)s, %(index_oid)s, %(index_name)s, %(index_type)s, %(definition)s, %(is_unique)s, %(is_primary)s
)
"""

[UPDATE]
default = """
UPDATE metadata.index
SET
    table_id = %(table_id)s,
    name = %(index_name)s,
    type = %(index_type)s,
    definition = %(definition)s,
    is_unique = %(is_unique)s,
    is_primary = %(is_primary)s,
    updated_at = now()
WHERE oid = %(index_oid)s
  AND database_id = %(database_id)s
  AND deleted_at IS NULL
"""

soft_delete = """
UPDATE metadata.index
SET deleted_at = now()
WHERE oid = ANY(%(removed_oids)s)
  AND database_id = %(database_id)s
  AND deleted_at IS NULL
"""
